<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciências / Science — Simulado</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
:root{--paper:#fef9ec;--ink:#1a1a2e;--red:#e63946;--yellow:#ffbe0b;--blue:#3a86ff;--green:#06a77d;--purple:#7209b7;--teal:#0096a0;--shadow:5px 5px 0 var(--ink)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:20px 16px 48px;background-image:radial-gradient(circle at 15% 10%,rgba(6,167,125,.15) 0%,transparent 40%),radial-gradient(circle at 85% 85%,rgba(114,9,183,.12) 0%,transparent 40%)}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:24px;padding:20px 20px 16px;background:#fff;border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);position:relative}
header::before{content:'🫁';position:absolute;top:-16px;left:20px;font-size:34px;transform:rotate(-10deg)}
header::after{content:'🔬';position:absolute;top:-16px;right:20px;font-size:34px;transform:rotate(10deg)}
h1{font-family:'Fraunces',serif;font-size:clamp(1.4rem,5vw,2rem);font-weight:900;line-height:1}
h1 .accent{color:var(--green);font-style:italic}
h1 .accent2{color:var(--purple);font-style:italic}
.subtitle{font-family:'Caveat',cursive;font-size:1.2rem;color:var(--blue);margin-top:4px}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-weight:700;font-size:.9rem}
.progress-bar{flex:1;height:12px;background:#e8e8e8;border:2px solid var(--ink);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);width:0%;transition:width .4s}
.question-card{background:#fff;border:3px solid var(--ink);border-radius:18px;padding:22px 18px 18px;box-shadow:var(--shadow);margin-bottom:14px}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.q-number{font-family:'Fraunces',serif;font-size:1rem;font-weight:900;background:var(--ink);color:var(--paper);padding:2px 10px;border-radius:20px}
.q-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border:2px solid var(--ink);border-radius:20px;background:var(--yellow);text-transform:uppercase;letter-spacing:.4px}
.q-passage{background:#e6fff4;border-left:4px solid var(--green);padding:10px 13px;border-radius:6px;font-size:.91rem;line-height:1.6;margin-bottom:14px;font-style:italic}
.q-text{font-size:1.03rem;font-weight:700;line-height:1.4;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:9px}
.option{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border:2px solid #ccc;border-radius:12px;cursor:pointer;background:#fafafa;transition:all .15s;font-size:.95rem;font-weight:500;text-align:left;width:100%;font-family:'DM Sans',sans-serif;line-height:1.4}
.option:hover:not(.locked){border-color:var(--green);background:#e6fff4;transform:translateX(3px)}
.option .letter{font-family:'Fraunces',serif;font-weight:900;font-size:.95rem;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:2px solid var(--ink);border-radius:50%;background:#fff;flex-shrink:0;margin-top:1px}
.option.locked{cursor:default}
.option.correct{border-color:var(--green);background:#e6fff6}
.option.correct .letter{background:var(--green);color:#fff;border-color:var(--green)}
.option.wrong{border-color:var(--red);background:#fff0f0}
.option.wrong .letter{background:var(--red);color:#fff;border-color:var(--red)}
.option.show-ok{border-color:var(--green);background:#e6fff6;opacity:.55}
.feedback{display:none;margin-top:12px;padding:11px 13px;border-radius:10px;font-size:.91rem;line-height:1.5;border:2px solid}
.feedback.show{display:block}
.feedback.correct{background:#e6fff6;border-color:var(--green);color:#054f35}
.feedback.wrong{background:#fff0f0;border-color:var(--red);color:#7a1010}
.btn-next{display:none;margin-top:12px;width:100%;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:13px;border:3px solid var(--ink);border-radius:12px;background:var(--green);color:#fff;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:all .1s}
.btn-next:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.btn-next.show{display:block}
.results{display:none;text-align:center;background:#fff;border:3px solid var(--ink);border-radius:20px;padding:32px 22px;box-shadow:var(--shadow)}
.results.show{display:block}
.results .big-emoji{font-size:3.8rem;display:block;margin-bottom:8px}
.results h2{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:900;margin-bottom:8px}
.score-display{font-family:'Fraunces',serif;font-size:3.2rem;font-weight:900;color:var(--green);margin:10px 0}
.score-label{font-family:'Caveat',cursive;font-size:1.2rem;color:#666;margin-bottom:18px}
.result-breakdown{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.result-item{text-align:center;padding:9px 16px;border:2px solid var(--ink);border-radius:12px;background:var(--paper)}
.r-val{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;display:block}
.r-val.green{color:var(--green)}.r-val.red{color:var(--red)}
.r-label{font-size:.78rem;font-weight:700}
.wrong-list{text-align:left;background:#fff8f8;border:2px solid var(--red);border-radius:12px;padding:13px 15px;margin-bottom:18px;font-size:.88rem;line-height:1.7}
.wrong-list h3{font-family:'Fraunces',serif;font-size:.95rem;color:var(--red);margin-bottom:7px}
.btn-restart{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:12px 26px;border:3px solid var(--ink);border-radius:12px;background:var(--green);color:#fff;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
</style>
</head>
<body>
<div class="container">
<header>
  <h1><span class="accent">Ciências</span> / <span class="accent2">Science</span></h1>
  <p class="subtitle">15 questões — vai com tudo, Helô! 💪</p>
</header>
<div class="progress-wrap">
  <span id="progressLabel">Questão 1 de 15</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div id="quizArea"></div>
<div class="results" id="resultsScreen"></div>
</div>
<script>
var questions=[
  // RESPIRATÓRIO (4)
  {tag:'Respiratório',q:'Qual é a principal função do sistema respiratório?',opts:['Transportar nutrientes pelo corpo','Levar oxigênio ao sangue e eliminar gás carbônico','Digerir os alimentos','Produzir hormônios'],c:1,why:'O sistema respiratório leva O₂ para o sangue e retira o CO₂. Essa troca ocorre nos alvéolos dos pulmões.'},
  {tag:'Respiratório',q:'O que são os alvéolos pulmonares?',opts:['Os tubos que conduzem o ar até os pulmões','O músculo que controla a respiração','Bolsinhas nos pulmões onde ocorre a troca de gases','As vias que ligam o nariz à traqueia'],c:2,why:'Nos alvéolos, o oxigênio passa para o sangue e o gás carbônico sai do sangue para ser expirado.'},
  {tag:'Respiratório',passage:'Durante a inspiração, o diafragma se contrai e desce.',q:'O que acontece com o ar quando o diafragma desce?',opts:['O ar sai dos pulmões','O ar entra nos pulmões','O gás carbônico aumenta no sangue','Os brônquios se fecham'],c:1,why:'Diafragma desce → aumenta o espaço no tórax → ar entra. É assim que a inspiração funciona.'},
  {tag:'Respiratório',q:'Qual a função do nariz na respiração?',opts:['Produzir oxigênio','Filtrar, aquecer e umidificar o ar','Bombear o ar para os pulmões','Realizar a troca de gases'],c:1,why:'O nariz prepara o ar antes de chegar aos pulmões: filtra impurezas, aquece e umidifica.'},

  // CIRCULATÓRIO (4)
  {tag:'Circulatório',q:'O que diferencia artérias de veias?',opts:['As artérias são mais grossas','Artérias levam sangue do coração; veias trazem sangue ao coração','As veias levam sangue oxigenado','Não há diferença entre elas'],c:1,why:'Artérias = saem do coração com sangue oxigenado. Veias = voltam ao coração com sangue rico em CO₂.'},
  {tag:'Circulatório',passage:'O coração bombeia o sangue para os pulmões, onde ele recebe oxigênio. Em seguida, o sangue retorna ao coração e é enviado para todo o corpo.',q:'Esse trecho descreve qual sistema?',opts:['Sistema digestivo','Sistema nervoso','Sistema circulatório','Sistema endócrino'],c:2,why:'O trajeto do sangue pelo coração e pulmões descreve o sistema circulatório — a circulação sanguínea.'},
  {tag:'Circulatório',q:'Quantas câmaras tem o coração humano?',opts:['2','3','4','6'],c:2,why:'O coração humano tem 4 câmaras: átrio direito, átrio esquerdo, ventrículo direito e ventrículo esquerdo.'},
  {tag:'Circulatório',q:'Como os sistemas respiratório e circulatório trabalham juntos?',opts:['O circulatório digere os alimentos trazidos pelo respiratório','O respiratório capta O₂ e o circulatório distribui pelo corpo','São independentes e não se relacionam','O respiratório bombeia o sangue pelos vasos'],c:1,why:'Parceria essencial: respiratório capta oxigênio nos pulmões, circulatório distribui para todas as células.'},

  // DIGESTIVO — Science (4)
  {tag:'Science — Digestive',q:'Where does digestion BEGIN in the human body?',opts:['In the stomach','In the small intestine','In the mouth','In the esophagus'],c:2,why:'Digestion starts in the MOUTH. Saliva contains enzymes that already begin breaking down food as you chew.'},
  {tag:'Science — Digestive',q:'What is the main job of the SMALL INTESTINE?',opts:['To store solid waste','To mix food with stomach acid','To absorb nutrients into the bloodstream','To filter blood'],c:2,why:'The small intestine is where most digestion happens and where nutrients are absorbed into the blood.'},
  {tag:'Science — Digestive',passage:'After food leaves the stomach, it enters the small intestine as a liquid mixture.',q:'What happens to nutrients in the small intestine?',opts:['They are removed from the body as waste','They are absorbed into the bloodstream','They are sent back to the stomach','They are converted into oxygen'],c:1,why:'The small intestine absorbs nutrients through its walls into the bloodstream, which carries them to all cells.'},
  {tag:'Science — Digestive',q:'What does the LARGE INTESTINE do?',opts:['It produces digestive enzymes','It absorbs water and forms solid waste','It stores oxygen for the body','It mixes food with saliva'],c:1,why:'The large intestine absorbs water from leftover material and turns it into solid waste to be removed.'},

  // ALIMENTAÇÃO / NUTRITION (3)
  {tag:'Alimentação / Nutrition',q:'Qual nutriente é a principal fonte de energia do corpo?',opts:['Proteínas','Vitaminas','Carboidratos','Sais minerais'],c:2,why:'Carboidratos (pão, arroz, massa) são o combustível principal do corpo — fornecem energia para todas as atividades.'},
  {tag:'Alimentação / Nutrition',q:'Para que servem as proteínas?',opts:['Fornecer energia imediata','Construir e reparar músculos e tecidos','Regular funções do organismo','Proteger os rins'],c:1,why:'Proteínas são os "tijolos" do corpo — constroem músculos, tecidos e células. Encontradas em carnes, ovos, feijão.'},
  {tag:'Alimentação / Nutrition',q:'Which nutrients strengthen bones and teeth? / Quais nutrientes fortalecem ossos e dentes?',opts:['Carbohydrates / Carboidratos','Vitamins / Vitaminas','Mineral salts (calcium) / Sais minerais (cálcio)','Fats / Gorduras'],c:2,why:'Mineral salts, especially calcium (found in milk), strengthen bones and teeth. Sais minerais, especialmente o cálcio (leite).'},
];

var currentQ=0,score=0,wrongQuestions=[],answered=false;
function renderQuestion(){
  var q=questions[currentQ];answered=false;
  document.getElementById('progressFill').style.width=(currentQ/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent='Questão '+(currentQ+1)+' de '+questions.length;
  var letters=['A','B','C','D'];
  var passHTML=q.passage?'<div class="q-passage">'+q.passage+'</div>':'';
  var optsHTML=q.opts.map(function(o,i){return '<button class="option" data-index="'+i+'"><span class="letter">'+letters[i]+'</span><span>'+o+'</span></button>';}).join('');
  document.getElementById('quizArea').innerHTML='<div class="question-card"><div class="q-meta"><span class="q-number">Q'+(currentQ+1)+'</span><span class="q-tag">'+q.tag+'</span></div>'+passHTML+'<div class="q-text">'+q.q+'</div><div class="options">'+optsHTML+'</div><div class="feedback" id="feedback"></div><button class="btn-next" id="btnNext">'+(currentQ<questions.length-1?'Próxima →':'Ver resultado 🎉')+'</button></div>';
  document.querySelectorAll('.option').forEach(function(btn){btn.addEventListener('click',function(){if(answered)return;selectAnswer(parseInt(btn.dataset.index));});});
  document.getElementById('btnNext').addEventListener('click',function(){currentQ++;if(currentQ<questions.length)renderQuestion();else showResults();});
}
function selectAnswer(chosen){
  answered=true;var q=questions[currentQ];var isCorrect=chosen===q.c;var letters=['A','B','C','D'];
  if(isCorrect)score++;else wrongQuestions.push({n:currentQ+1,text:q.q,correct:letters[q.c]+') '+q.opts[q.c]});
  document.querySelectorAll('.option').forEach(function(btn,i){btn.classList.add('locked');if(i===q.c&&i===chosen)btn.classList.add('correct');else if(i===chosen)btn.classList.add('wrong');else if(i===q.c)btn.classList.add('show-ok');});
  var fb=document.getElementById('feedback');fb.classList.add('show');fb.classList.add(isCorrect?'correct':'wrong');
  fb.innerHTML='<strong>'+(isCorrect?'✅ Correto!':'❌ Não foi dessa vez.')+'</strong> '+q.why;
  document.getElementById('btnNext').classList.add('show');
}
function showResults(){
  document.getElementById('quizArea').style.display='none';document.getElementById('progressLabel').parentElement.style.display='none';
  var pct=Math.round(score/questions.length*100);var emoji,msg;
  if(pct>=90){emoji='🏆';msg='Excelente! Pronta para a prova!';}
  else if(pct>=70){emoji='🌟';msg='Muito bem! Revise os erros e vai arrasar!';}
  else if(pct>=50){emoji='💪';msg='Bom esforço! Revise os tópicos e tente de novo.';}
  else{emoji='📚';msg='Continue estudando! Revise os resumos e flashcards.';}
  var wrongHTML='';
  if(wrongQuestions.length){wrongHTML='<div class="wrong-list"><h3>⚠️ Revise esses tópicos:</h3>';wrongQuestions.forEach(function(w){wrongHTML+='<div>Q'+w.n+': '+w.text+'<br><strong>✓ '+w.correct+'</strong></div><br>';});wrongHTML+='</div>';}
  var rs=document.getElementById('resultsScreen');
  rs.innerHTML='<span class="big-emoji">'+emoji+'</span><h2>'+msg+'</h2><div class="score-display">'+score+' / '+questions.length+'</div><div class="score-label">'+pct+'% de acerto</div><div class="result-breakdown"><div class="result-item"><span class="r-val green">'+score+'</span><span class="r-label">Acertos</span></div><div class="result-item"><span class="r-val red">'+wrongQuestions.length+'</span><span class="r-label">Erros</span></div><div class="result-item"><span class="r-val" style="color:var(--green)">'+pct+'%</span><span class="r-label">Nota</span></div></div>'+wrongHTML+'<button class="btn-restart" id="btnRestart">Tentar novamente 🔁</button>';
  rs.classList.add('show');
  document.getElementById('btnRestart').addEventListener('click',function(){currentQ=0;score=0;wrongQuestions=[];answered=false;document.getElementById('quizArea').style.display='';document.getElementById('progressLabel').parentElement.style.display='';rs.classList.remove('show');renderQuestion();});
}
renderQuestion();
</script>
</body>
</html>
