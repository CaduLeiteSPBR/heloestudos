<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
:root{--paper:#fef9ec;--ink:#1a1a2e;--red:#e63946;--yellow:#ffbe0b;--blue:#3a86ff;--green:#06a77d;--purple:#7209b7;--teal:#0096a0;--shadow:6px 6px 0 var(--ink)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:20px 16px 40px;background-image:radial-gradient(circle at 20% 10%,rgba(0,150,160,.15) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(114,9,183,.12) 0%,transparent 40%)}
.container{max-width:700px;margin:0 auto}
header{text-align:center;margin-bottom:22px}
h1{font-family:'Fraunces',serif;font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;line-height:1}
h1 .accent{color:var(--teal);font-style:italic}
.subtitle{font-family:'Caveat',cursive;font-size:1.25rem;color:var(--blue);margin-top:4px}
.top-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:3px solid var(--ink);border-radius:14px;padding:10px 14px;box-shadow:3px 3px 0 var(--ink);margin-bottom:14px;font-size:.9rem;font-weight:700;flex-wrap:wrap;gap:8px}
.progress{display:flex;align-items:center;gap:8px}
.progress-bar{width:100px;height:10px;background:#eee;border:2px solid var(--ink);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);width:0%;transition:width .4s}
.cat-badge{padding:3px 10px;border:2px solid var(--ink);border-radius:20px;font-size:.75rem;background:var(--yellow);text-transform:uppercase;letter-spacing:.5px}
.filters{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.filter-btn{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;padding:5px 11px;border:2px solid var(--ink);border-radius:20px;background:#fff;cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--ink);color:var(--paper)}
.flashcard{width:100%;min-height:320px;border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);padding:44px 22px 40px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#fff 0%,#e6fffe 100%);cursor:pointer;position:relative;margin-bottom:18px;transition:background .25s ease,opacity .15s ease;user-select:none;-webkit-user-select:none}
.flashcard.is-back{background:linear-gradient(135deg,#fff 0%,#e6f4ff 100%)}
.flashcard.fading{opacity:0}
.card-label{position:absolute;top:13px;left:16px;font-family:'Caveat',cursive;font-size:.95rem;color:var(--purple);font-weight:700}
.card-counter{position:absolute;top:13px;right:16px;font-size:.78rem;color:#888;font-weight:700}
.card-hint{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);font-family:'Caveat',cursive;font-size:.95rem;color:#999;white-space:nowrap}
.card-content{width:100%}
.card-prompt{font-family:'Fraunces',serif;font-size:clamp(1.2rem,4vw,1.7rem);font-weight:900;line-height:1.3;margin-bottom:10px}
.card-sub{font-size:.93rem;color:#666;font-style:italic;line-height:1.4}
.card-answer{font-family:'Fraunces',serif;font-size:clamp(1.2rem,4vw,1.7rem);font-weight:900;color:var(--blue);margin-bottom:10px;line-height:1.3}
.card-example{background:rgba(255,190,11,.25);border-left:3px solid var(--yellow);padding:9px 12px;border-radius:6px;font-size:.88rem;font-style:italic;max-width:95%;margin:0 auto;line-height:1.5}
.card-example strong{color:var(--red);font-style:normal}
.controls{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:10px;margin-bottom:12px}
.btn{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:12px 14px;border:3px solid var(--ink);border-radius:12px;background:#fff;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:all .1s}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.btn-nav{font-size:1.2rem;padding:12px 12px}
.btn-got{background:var(--green);color:#fff}
.btn-rev{background:var(--red);color:#fff}
.tools{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.tool-btn{font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:700;padding:7px 13px;border:2px solid var(--ink);border-radius:20px;background:#fff;cursor:pointer}
.tool-btn:hover{background:var(--yellow)}
.stats{margin-top:18px;padding:13px;background:#fff;border:3px solid var(--ink);border-radius:14px;display:flex;justify-content:space-around;text-align:center;font-size:.83rem}
.stat-value{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:900;display:block}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}
.finished{text-align:center;padding:36px 20px;background:#fff;border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);display:none}
.finished.show{display:block}
.finished h2{font-family:'Fraunces',serif;font-size:1.9rem;color:var(--green);margin-bottom:10px}
.finished .big{font-size:3.5rem;display:block;margin-bottom:8px}
@media(max-width:480px){.controls{grid-template-columns:1fr 1fr}.btn-nav{grid-column:span 1}.flashcard{min-height:300px;padding:40px 16px 38px}}
</style>
</head>
<body>
<div class="container">
<header>
  <h1><span class="accent">Math</span> Flashcards</h1>
  <p class="subtitle">Tap the card to see the answer! 🎴</p>
</header>

<div class="top-bar">
  <div class="progress">
    <span id="progressText">1 / 40</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="cat-badge" id="catBadge">Geometry</div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All (40)</button>
  <button class="filter-btn" data-filter="symmetry">Symmetry</button>
  <button class="filter-btn" data-filter="triangles">Triangles</button>
  <button class="filter-btn" data-filter="fractions">Fractions</button>
  <button class="filter-btn" data-filter="measurement">Measurement</button>
  <button class="filter-btn" data-filter="data">Data</button>
  <button class="filter-btn" data-filter="review">⚠️ Review</button>
</div>

<div class="flashcard" id="flashcard" role="button" tabindex="0">
  <div class="card-label" id="cardLabel">Symmetry</div>
  <div class="card-counter" id="cardCounter">1/40</div>
  <div class="card-content" id="cardContent"></div>
  <div class="card-hint" id="cardHint">👆 tap to see answer</div>
</div>

<div class="controls">
  <button class="btn btn-nav" id="prevBtn">◀</button>
  <button class="btn btn-rev" id="reviewBtn">Review again</button>
  <button class="btn btn-got" id="gotItBtn">I got it! ✓</button>
  <button class="btn btn-nav" id="nextBtn">▶</button>
</div>

<div class="tools">
  <button class="tool-btn" id="shuffleBtn">🔀 Shuffle</button>
  <button class="tool-btn" id="resetBtn">↺ Reset</button>
</div>

<div class="stats">
  <div><span class="stat-value green" id="statGood">0</span><span>Got it</span></div>
  <div><span class="stat-value red" id="statReview">0</span><span>Review</span></div>
  <div><span class="stat-value blue" id="statLeft">40</span><span>Left</span></div>
</div>

<div class="finished" id="finishedScreen">
  <span class="big">🎉</span>
  <h2>Amazing, Helô!</h2>
  <p style="margin-bottom:14px">You reviewed all the cards.</p>
  <p id="finishedStats" style="margin-bottom:20px"></p>
  <button class="btn" id="restartBtn" style="background:var(--blue);color:#fff">Start again 🔁</button>
</div>
</div>

<script>
var allCards = [
  // SYMMETRY (8)
  {cat:'symmetry',label:'Symmetry',q:'What is a REFLECTION?',sub:'Type of transformation',a:'Flipping a shape over a line (mirror image)',ex:'The shape looks like it is reflected in a <strong>mirror</strong>.'},
  {cat:'symmetry',label:'Symmetry',q:'What is a ROTATION?',sub:'Type of transformation',a:'Turning a shape around a fixed point',ex:'You can rotate 90°, 180°, or 270°. The shape stays the same size.'},
  {cat:'symmetry',label:'Symmetry',q:'What is a TRANSLATION?',sub:'Type of transformation',a:'Sliding a shape in any direction without turning or flipping',ex:'Every point moves the <strong>same distance</strong> in the same direction.'},
  {cat:'symmetry',label:'Symmetry',q:'Do transformations change the SIZE of a shape?',sub:'Reflection, rotation, translation',a:'No — size and shape always stay the same',ex:'Only the <strong>position</strong> or <strong>orientation</strong> changes. Size is always preserved.'},
  {cat:'symmetry',label:'Symmetry',q:'A shape is flipped over a vertical line. Which transformation is this?',sub:'',a:'Reflection',ex:'Flipping over any line = <strong>reflection</strong> (like a mirror image).'},
  {cat:'symmetry',label:'Symmetry',q:'A shape is turned 90° clockwise. Which transformation is this?',sub:'',a:'Rotation',ex:'Turning around a point = <strong>rotation</strong>. 90° = quarter turn.'},
  {cat:'symmetry',label:'Symmetry',q:'A shape moves 3 units to the right. Which transformation is this?',sub:'',a:'Translation',ex:'Sliding without turning or flipping = <strong>translation</strong>.'},
  {cat:'symmetry',label:'Symmetry',q:'What stays the same in ALL three transformations?',sub:'Reflection, rotation, translation',a:'The shape and size (congruent)',ex:'All transformations produce <strong>congruent</strong> figures — same shape, same size.'},

  // TRIANGLES & ANGLES (12)
  {cat:'triangles',label:'Triangles',q:'What is an EQUILATERAL triangle?',sub:'',a:'3 equal sides and 3 equal angles (60° each)',ex:'Equilateral = all sides equal. All angles = <strong>60°</strong>.'},
  {cat:'triangles',label:'Triangles',q:'What is an ISOSCELES triangle?',sub:'',a:'2 equal sides and 2 equal angles',ex:'Iso = equal. <strong>2 sides</strong> the same length, <strong>2 base angles</strong> equal.'},
  {cat:'triangles',label:'Triangles',q:'What is a SCALENE triangle?',sub:'',a:'No equal sides and no equal angles',ex:'All 3 sides are <strong>different lengths</strong>. All 3 angles are different.'},
  {cat:'triangles',label:'Triangles',q:'What is a RIGHT triangle?',sub:'',a:'A triangle with one 90° angle',ex:'The right angle is marked with a small <strong>square</strong> in the corner.'},
  {cat:'triangles',label:'Triangles',q:'What do all angles of a triangle add up to?',sub:'Always!',a:'180°',ex:'60° + 70° + 50° = <strong>180°</strong>. Always check your answer adds to 180°.'},
  {cat:'triangles',label:'Triangles',q:'A triangle has angles 60°, 60°, and 60°. What type is it?',sub:'',a:'Equilateral',ex:'3 equal angles (60° each) = <strong>equilateral</strong> triangle.'},
  {cat:'triangles',label:'Triangles',q:'A triangle has one angle of 90°. What type is it?',sub:'',a:'Right triangle',ex:'One <strong>90°</strong> angle = right triangle.'},
  {cat:'triangles',label:'Triangles',q:'What is an ACUTE angle?',sub:'',a:'An angle less than 90°',ex:'Acute = sharp. <strong>Less than 90°</strong>. Example: 45°, 30°, 70°.'},
  {cat:'triangles',label:'Triangles',q:'What is an OBTUSE angle?',sub:'',a:'An angle greater than 90° but less than 180°',ex:'Obtuse = wide. <strong>More than 90°</strong>. Example: 120°, 150°.'},
  {cat:'triangles',label:'Triangles',q:'What is a RIGHT angle?',sub:'',a:'An angle of exactly 90°',ex:'Marked with a small <strong>square</strong>. Found in squares, rectangles, right triangles.'},
  {cat:'triangles',label:'Triangles',q:'A triangle has angles 40° and 70°. What is the third angle?',sub:'Remember: angles add to 180°',a:'70° (40 + 70 + 70 = 180)',ex:'180° − 40° − 70° = <strong>70°</strong>. Always subtract from 180°.'},
  {cat:'triangles',label:'Triangles',q:'A triangle has angles 30°, 60°, and 90°. What type is it?',sub:'',a:'Right triangle (has a 90° angle)',ex:'Any triangle with a <strong>90°</strong> angle is a right triangle.'},

  // FRACTIONS (8)
  {cat:'fractions',label:'Fractions',q:'3/8 + 4/8 = ?',sub:'Same denominator',a:'7/8',ex:'Add only the numerators: 3+4=<strong>7</strong>. Denominator stays <strong>8</strong>.'},
  {cat:'fractions',label:'Fractions',q:'9/10 − 3/10 = ?',sub:'Same denominator',a:'6/10',ex:'Subtract numerators: 9−3=<strong>6</strong>. Denominator stays <strong>10</strong>.'},
  {cat:'fractions',label:'Fractions',q:'5/12 + 5/12 = ?',sub:'',a:'10/12',ex:'5+5=<strong>10</strong>. Denominator stays: <strong>10/12</strong>.'},
  {cat:'fractions',label:'Fractions',q:'7/8 − 2/8 = ?',sub:'',a:'5/8',ex:'7−2=<strong>5</strong>. Denominator stays: <strong>5/8</strong>.'},
  {cat:'fractions',label:'Fractions',q:'What is the rule for adding fractions with the same denominator?',sub:'',a:'Add only the numerators. Keep the denominator.',ex:'2/5 + 1/5 = <strong>3/5</strong>. The 5 never changes!'},
  {cat:'fractions',label:'Fractions',q:'Solve: (3 + 2) × 4',sub:'Numerical expression',a:'20',ex:'Parentheses first: (3+2)=<strong>5</strong>. Then: 5×4=<strong>20</strong>.'},
  {cat:'fractions',label:'Fractions',q:'Solve: 3 + 2 × 4',sub:'Order of operations — no parentheses',a:'11',ex:'Multiply first: 2×4=<strong>8</strong>. Then add: 3+8=<strong>11</strong>.'},
  {cat:'fractions',label:'Fractions',q:'What does "like denominators" mean?',sub:'',a:'Fractions with the same bottom number',ex:'3/8 and 5/8 have <strong>like denominators</strong> (both 8). Easy to add!'},

  // MEASUREMENT (6)
  {cat:'measurement',label:'Measurement',q:'How many seconds are in 1 minute?',sub:'',a:'60 seconds',ex:'60 seconds = 1 minute. 3,600 seconds = 1 hour.'},
  {cat:'measurement',label:'Measurement',q:'How many minutes are in 1 hour?',sub:'',a:'60 minutes',ex:'60 minutes = 1 hour. Half hour = <strong>30 minutes</strong>.'},
  {cat:'measurement',label:'Measurement',q:'How many hours are in 1 day?',sub:'',a:'24 hours',ex:'24 hours = 1 day. Half day = <strong>12 hours</strong>.'},
  {cat:'measurement',label:'Measurement',q:'How many months are in 1 year?',sub:'',a:'12 months',ex:'January to December = <strong>12 months</strong> = 1 year.'},
  {cat:'measurement',label:'Measurement',q:'1 meter = how many centimeters?',sub:'',a:'100 centimeters',ex:'1 m = <strong>100 cm</strong>. To convert m→cm: multiply by 100.'},
  {cat:'measurement',label:'Measurement',q:'1 kilometer = how many meters?',sub:'',a:'1,000 meters',ex:'1 km = <strong>1,000 m</strong>. Kilo always means 1,000.'},

  // DATA (6)
  {cat:'data',label:'Data & Graphs',q:'What is a bar graph best used for?',sub:'',a:'Comparing quantities between different categories',ex:'Taller bar = bigger value. Good for: votes, scores, populations.'},
  {cat:'data',label:'Data & Graphs',q:'What is a line graph best used for?',sub:'',a:'Showing change over time',ex:'Line going up = increasing. Good for: temperature, growth, sales over months.'},
  {cat:'data',label:'Data & Graphs',q:'What are the 3 steps to read any graph?',sub:'',a:'1) Read the title  2) Read the axes  3) Find the value',ex:'Title = what. Axes = categories and values. Then locate your answer.'},
  {cat:'data',label:'Data & Graphs',q:'What does the Y-axis usually show?',sub:'Vertical axis',a:'The numerical values (amounts, counts, measurements)',ex:'Y-axis goes up and down. Shows <strong>how much</strong> or <strong>how many</strong>.'},
  {cat:'data',label:'Data & Graphs',q:'What does the X-axis usually show?',sub:'Horizontal axis',a:'The categories or time periods',ex:'X-axis goes left and right. Shows <strong>what</strong> is being compared or <strong>when</strong>.'},
  {cat:'data',label:'Data & Graphs',q:'How do you solve a word problem using a graph?',sub:'4 steps',a:'Read question → find data in graph → choose operation → solve',ex:'Always check: are you adding, subtracting, or comparing? Read carefully!'},
];

var cards = allCards.slice(), currentIndex = 0, showingAnswer = false, currentFilter = 'all';
var knownSet = new Set(), reviewSet = new Set();
var flashcard=document.getElementById('flashcard'),cardLabel=document.getElementById('cardLabel'),cardCounter=document.getElementById('cardCounter'),cardContent=document.getElementById('cardContent'),cardHint=document.getElementById('cardHint'),catBadge=document.getElementById('catBadge'),progressText=document.getElementById('progressText'),progressFill=document.getElementById('progressFill'),statGood=document.getElementById('statGood'),statReview=document.getElementById('statReview'),statLeft=document.getElementById('statLeft'),finishedScreen=document.getElementById('finishedScreen'),finishedStats=document.getElementById('finishedStats');

function getId(c){return c.cat+'::'+c.q;}
function renderFront(c){cardContent.innerHTML='<div class="card-prompt">'+c.q+'</div>'+(c.sub?'<div class="card-sub">'+c.sub+'</div>':'');cardHint.textContent='👆 tap to see answer';flashcard.classList.remove('is-back');}
function renderBack(c){cardContent.innerHTML='<div class="card-answer">'+c.a+'</div>'+(c.ex?'<div class="card-example">'+c.ex+'</div>':'');cardHint.textContent='👆 tap to see question';flashcard.classList.add('is-back');}
function renderCard(){
  if(!cards.length){cardContent.innerHTML='<div class="card-prompt">🎉</div><div class="card-sub">No cards match this filter!</div>';cardLabel.textContent='';cardCounter.textContent='';cardHint.textContent='';return;}
  var c=cards[currentIndex];showingAnswer=false;cardLabel.textContent=c.label;cardCounter.textContent=(currentIndex+1)+'/'+cards.length;renderFront(c);
  var cats={symmetry:'Symmetry',triangles:'Triangles',fractions:'Fractions',measurement:'Measurement',data:'Data'};
  catBadge.textContent=cats[c.cat]||c.cat;progressText.textContent=(currentIndex+1)+' / '+cards.length;progressFill.style.width=((currentIndex+1)/cards.length*100)+'%';updateStats();
}
function toggleAnswer(){if(!cards.length)return;var c=cards[currentIndex];if(!c||c.cat==='info')return;flashcard.classList.add('fading');setTimeout(function(){showingAnswer=!showingAnswer;if(showingAnswer)renderBack(c);else renderFront(c);flashcard.classList.remove('fading');},120);}
function updateStats(){statGood.textContent=knownSet.size;statReview.textContent=reviewSet.size;statLeft.textContent=Math.max(0,allCards.length-knownSet.size);}
function nextCard(){if(currentIndex<cards.length-1){currentIndex++;renderCard();}else showFinished();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
function showFinished(){flashcard.style.display='none';document.querySelector('.controls').style.display='none';finishedScreen.classList.add('show');finishedStats.innerHTML='✅ <strong>'+knownSet.size+'</strong> mastered<br>🔁 <strong>'+reviewSet.size+'</strong> to review';}
function restart(){currentIndex=0;flashcard.style.display='';document.querySelector('.controls').style.display='';finishedScreen.classList.remove('show');applyFilter(currentFilter);}
function shuffle(){for(var i=cards.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cards[i];cards[i]=cards[j];cards[j]=t;}currentIndex=0;renderCard();}
function applyFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter===f);});if(f==='all')cards=allCards.slice();else if(f==='review'){cards=allCards.filter(function(c){return reviewSet.has(getId(c));});if(!cards.length)cards=[{cat:'info',label:'',q:'😊',sub:'No cards marked for review yet!',a:'',ex:''}];}else cards=allCards.filter(function(c){return c.cat===f;});currentIndex=0;renderCard();}

flashcard.addEventListener('click',toggleAnswer);
flashcard.addEventListener('keydown',function(e){if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleAnswer();}});
document.getElementById('nextBtn').addEventListener('click',function(e){e.stopPropagation();nextCard();});
document.getElementById('prevBtn').addEventListener('click',function(e){e.stopPropagation();prevCard();});
document.getElementById('gotItBtn').addEventListener('click',function(e){e.stopPropagation();if(!cards.length||cards[currentIndex].cat==='info')return;var id=getId(cards[currentIndex]);knownSet.add(id);reviewSet.delete(id);nextCard();});
document.getElementById('reviewBtn').addEventListener('click',function(e){e.stopPropagation();if(!cards.length||cards[currentIndex].cat==='info')return;var id=getId(cards[currentIndex]);reviewSet.add(id);knownSet.delete(id);nextCard();});
document.getElementById('shuffleBtn').addEventListener('click',shuffle);
document.getElementById('resetBtn').addEventListener('click',function(){if(confirm('Reset all progress?')){knownSet.clear();reviewSet.clear();applyFilter('all');}});
document.getElementById('restartBtn').addEventListener('click',restart);
document.querySelectorAll('.filter-btn').forEach(function(btn){btn.addEventListener('click',function(){applyFilter(btn.dataset.filter);});});
document.addEventListener('keydown',function(e){if(e.target===flashcard)return;if(e.key==='ArrowRight')nextCard();else if(e.key==='ArrowLeft')prevCard();else if(e.key===' '){e.preventDefault();toggleAnswer();}});
document.querySelector('[data-filter="all"]').textContent='All ('+allCards.length+')';
renderCard();
</script>
</body>
</html>
