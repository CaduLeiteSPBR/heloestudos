<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Língua Portuguesa — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
:root{--paper:#fef9ec;--ink:#1a1a2e;--red:#e63946;--yellow:#ffbe0b;--blue:#3a86ff;--green:#06a77d;--purple:#7209b7;--pink:#e0449a;--shadow:6px 6px 0 var(--ink)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:20px 16px 40px;background-image:radial-gradient(circle at 20% 10%,rgba(224,68,154,.15) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(114,9,183,.12) 0%,transparent 40%)}
.container{max-width:700px;margin:0 auto}
header{text-align:center;margin-bottom:22px}
h1{font-family:'Fraunces',serif;font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;line-height:1}
h1 .accent{color:var(--pink);font-style:italic}
.subtitle{font-family:'Caveat',cursive;font-size:1.25rem;color:var(--blue);margin-top:4px}
.top-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border:3px solid var(--ink);border-radius:14px;padding:10px 14px;box-shadow:3px 3px 0 var(--ink);margin-bottom:14px;font-size:.9rem;font-weight:700;flex-wrap:wrap;gap:8px}
.progress{display:flex;align-items:center;gap:8px}
.progress-bar{width:100px;height:10px;background:#eee;border:2px solid var(--ink);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);width:0%;transition:width .4s}
.cat-badge{padding:3px 10px;border:2px solid var(--ink);border-radius:20px;font-size:.75rem;background:var(--yellow);text-transform:uppercase;letter-spacing:.5px}
.filters{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.filter-btn{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;padding:5px 11px;border:2px solid var(--ink);border-radius:20px;background:#fff;cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--ink);color:var(--paper)}
.flashcard{width:100%;min-height:320px;border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);padding:44px 22px 40px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#fff 0%,#fff0f7 100%);cursor:pointer;position:relative;margin-bottom:18px;transition:background .25s ease,opacity .15s ease;user-select:none;-webkit-user-select:none}
.flashcard.is-back{background:linear-gradient(135deg,#fff 0%,#e6f4ff 100%)}
.flashcard.fading{opacity:0}
.card-label{position:absolute;top:13px;left:16px;font-family:'Caveat',cursive;font-size:.95rem;color:var(--purple);font-weight:700}
.card-counter{position:absolute;top:13px;right:16px;font-size:.78rem;color:#888;font-weight:700}
.card-hint{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);font-family:'Caveat',cursive;font-size:.95rem;color:#999;white-space:nowrap}
.card-content{width:100%}
.card-prompt{font-family:'Fraunces',serif;font-size:clamp(1.2rem,4vw,1.7rem);font-weight:900;line-height:1.3;margin-bottom:10px}
.card-sub{font-size:.93rem;color:#666;font-style:italic;line-height:1.4}
.card-answer{font-family:'Fraunces',serif;font-size:clamp(1.2rem,4vw,1.7rem);font-weight:900;color:var(--blue);margin-bottom:10px;line-height:1.3}
.card-example{background:rgba(255,190,11,.25);border-left:3px solid var(--yellow);padding:9px 12px;border-radius:6px;font-size:.88rem;font-style:italic;max-width:95%;margin:0 auto;line-height:1.5}
.card-example strong{color:var(--red);font-style:normal}
.controls{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:10px;margin-bottom:12px}
.btn{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:12px 14px;border:3px solid var(--ink);border-radius:12px;background:#fff;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:all .1s}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.btn-nav{font-size:1.2rem;padding:12px 12px}
.btn-got{background:var(--green);color:#fff}
.btn-rev{background:var(--red);color:#fff}
.tools{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.tool-btn{font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:700;padding:7px 13px;border:2px solid var(--ink);border-radius:20px;background:#fff;cursor:pointer}
.tool-btn:hover{background:var(--yellow)}
.stats{margin-top:18px;padding:13px;background:#fff;border:3px solid var(--ink);border-radius:14px;display:flex;justify-content:space-around;text-align:center;font-size:.83rem}
.stat-value{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:900;display:block}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}
.finished{text-align:center;padding:36px 20px;background:#fff;border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);display:none}
.finished.show{display:block}
.finished h2{font-family:'Fraunces',serif;font-size:1.9rem;color:var(--green);margin-bottom:10px}
.finished .big{font-size:3.5rem;display:block;margin-bottom:8px}
@media(max-width:480px){.controls{grid-template-columns:1fr 1fr}.btn-nav{grid-column:span 1}.flashcard{min-height:300px;padding:40px 16px 38px}}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>Língua <span class="accent">Portuguesa</span></h1>
  <p class="subtitle">Toque no card para ver a resposta! 🎴</p>
</header>
<div class="top-bar">
  <div class="progress"><span id="progressText">1 / 40</span><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
  <div class="cat-badge" id="catBadge">Substantivos</div>
</div>
<div class="filters">
  <button class="filter-btn active" data-filter="all">Todos (40)</button>
  <button class="filter-btn" data-filter="substantivos">Substantivos</button>
  <button class="filter-btn" data-filter="verbos">Verbos</button>
  <button class="filter-btn" data-filter="acentuacao">Acentuação</button>
  <button class="filter-btn" data-filter="leitura">Leitura</button>
  <button class="filter-btn" data-filter="review">⚠️ Revisar</button>
</div>
<div class="flashcard" id="flashcard" role="button" tabindex="0">
  <div class="card-label" id="cardLabel">Substantivos</div>
  <div class="card-counter" id="cardCounter">1/40</div>
  <div class="card-content" id="cardContent"></div>
  <div class="card-hint" id="cardHint">👆 toque para ver a resposta</div>
</div>
<div class="controls">
  <button class="btn btn-nav" id="prevBtn">◀</button>
  <button class="btn btn-rev" id="reviewBtn">Revisar de novo</button>
  <button class="btn btn-got" id="gotItBtn">Acertei! ✓</button>
  <button class="btn btn-nav" id="nextBtn">▶</button>
</div>
<div class="tools">
  <button class="tool-btn" id="shuffleBtn">🔀 Embaralhar</button>
  <button class="tool-btn" id="resetBtn">↺ Resetar</button>
</div>
<div class="stats">
  <div><span class="stat-value green" id="statGood">0</span><span>Acertei</span></div>
  <div><span class="stat-value red" id="statReview">0</span><span>Revisar</span></div>
  <div><span class="stat-value blue" id="statLeft">40</span><span>Faltam</span></div>
</div>
<div class="finished" id="finishedScreen">
  <span class="big">🎉</span>
  <h2>Arrasou, Helô!</h2>
  <p style="margin-bottom:14px">Você revisou todos os cards.</p>
  <p id="finishedStats" style="margin-bottom:20px"></p>
  <button class="btn" id="restartBtn" style="background:var(--blue);color:#fff">Recomeçar 🔁</button>
</div>
</div>
<script>
var allCards = [
  // SUBSTANTIVOS (14)
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo concreto?',sub:'',a:'Nomeia seres que existem de verdade (dá para ver, tocar ou sentir)',ex:'<strong>cadeira, cachorro, árvore</strong> — você pode ver e tocar.'},
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo abstrato?',sub:'',a:'Nomeia sentimentos, estados ou ideias que não têm forma física',ex:'<strong>amor, alegria, liberdade</strong> — você sente, mas não pode tocar.'},
  {cat:'substantivos',label:'Substantivos',q:'Classifique: "saudade"',sub:'Concreto ou abstrato?',a:'Abstrato',ex:'Saudade é um sentimento — não tem forma física. <strong>Abstrato.</strong>'},
  {cat:'substantivos',label:'Substantivos',q:'Classifique: "livro"',sub:'Concreto ou abstrato?',a:'Concreto',ex:'Livro existe de verdade, você pode pegar. <strong>Concreto.</strong>'},
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo primitivo?',sub:'',a:'A palavra original, que deu origem a outras',ex:'<strong>pedra</strong> é primitivo. Dele vem "pedreiro", "pedreira".'},
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo derivado?',sub:'',a:'O que vem de outra palavra já existente',ex:'<strong>florista</strong> vem de "flor". <strong>Derivado.</strong>'},
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo simples?',sub:'',a:'Formado por apenas um radical (uma raiz)',ex:'<strong>sol, casa, livro</strong> — uma só raiz.'},
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo composto?',sub:'',a:'Formado por dois ou mais radicais',ex:'<strong>guarda-chuva, beija-flor</strong> — duas raízes juntas.'},
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo comum?',sub:'',a:'Nome genérico de qualquer ser da mesma espécie',ex:'<strong>cidade, menino, rio</strong> — serve para qualquer um.'},
  {cat:'substantivos',label:'Substantivos',q:'O que é um substantivo próprio?',sub:'',a:'Nome específico de um ser, lugar ou pessoa — sempre com maiúscula',ex:'<strong>São Paulo, Lucas, Amazonas</strong> — nome único.'},
  {cat:'substantivos',label:'Substantivos',q:'Classifique: "Brasil"',sub:'Comum ou próprio?',a:'Próprio',ex:'Brasil é o nome específico de um país. <strong>Próprio.</strong> Sempre com maiúscula!'},
  {cat:'substantivos',label:'Substantivos',q:'Classifique: "beija-flor"',sub:'Simples ou composto?',a:'Composto',ex:'"beija" + "flor" = duas raízes. <strong>Composto.</strong>'},
  {cat:'substantivos',label:'Substantivos',q:'Classifique: "pedreiro"',sub:'Primitivo ou derivado?',a:'Derivado (vem de "pedra")',ex:'Pedreiro vem de <strong>pedra</strong>. Portanto é <strong>derivado.</strong>'},
  {cat:'substantivos',label:'Substantivos',q:'Um substantivo pode ter mais de uma classificação?',sub:'',a:'Sim! Sempre tem pelo menos duas classificações simultâneas',ex:'"amor" = abstrato + primitivo + simples + comum. Quatro ao mesmo tempo!'},

  // VERBOS (14)
  {cat:'verbos',label:'Verbos',q:'O que é o modo indicativo?',sub:'',a:'Modo verbal que indica uma ação certa, real ou que o falante acredita ser verdade',ex:'"Eu corro todos os dias." — fato real no indicativo.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o presente do indicativo de "correr" (1ª pessoa)?',sub:'Eu...',a:'Eu corro',ex:'Presente = ação que acontece agora. <strong>Eu corro.</strong>'},
  {cat:'verbos',label:'Verbos',q:'Qual é o pretérito perfeito de "correr" (1ª pessoa)?',sub:'Ação concluída no passado',a:'Eu corri',ex:'Pretérito perfeito = ação acabada. <strong>Eu corri</strong> ontem.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o pretérito imperfeito de "correr" (1ª pessoa)?',sub:'Ação habitual no passado',a:'Eu corria',ex:'Imperfeito = ação que acontecia com frequência. <strong>Eu corria</strong> todo dia.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o futuro do presente de "correr" (1ª pessoa)?',sub:'Ação que vai acontecer',a:'Eu correrei',ex:'Futuro = ação que ainda vai acontecer. <strong>Eu correrei</strong> amanhã.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o presente do indicativo de "cantar" (3ª pessoa singular)?',sub:'Ele/ela...',a:'Ele canta',ex:'<strong>Ele canta</strong> muito bem. Presente do indicativo.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o pretérito perfeito de "cantar" (3ª pessoa singular)?',sub:'Ele/ela...',a:'Ele cantou',ex:'<strong>Ele cantou</strong> na festa ontem. Ação concluída.'},
  {cat:'verbos',label:'Verbos',q:'O que é o infinitivo de um verbo?',sub:'',a:'A forma básica do verbo, que termina em -ar, -er ou -ir',ex:'<strong>cantar, correr, sorrir</strong> — são infinitivos.'},
  {cat:'verbos',label:'Verbos',q:'O que é o gerúndio?',sub:'',a:'A forma do verbo que indica ação em andamento, termina em -ando, -endo ou -indo',ex:'<strong>cantando, correndo, sorrindo</strong> — ação acontecendo agora.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o gerúndio de "cantar"?',sub:'',a:'cantando',ex:'"Ela está <strong>cantando</strong> agora." — ação em andamento.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o gerúndio de "correr"?',sub:'',a:'correndo',ex:'"Ele está <strong>correndo</strong> no parque." — gerúndio de correr.'},
  {cat:'verbos',label:'Verbos',q:'Qual é o gerúndio de "sorrir"?',sub:'',a:'sorrindo',ex:'"A bebê está <strong>sorrindo</strong>." — gerúndio de sorrir.'},
  {cat:'verbos',label:'Verbos',q:'Identifique o tempo verbal: "Nós brincávamos no parque todo dia."',sub:'',a:'Pretérito imperfeito',ex:'Ação habitual no passado = <strong>pretérito imperfeito</strong>. Terminação -ávamos.'},
  {cat:'verbos',label:'Verbos',q:'Identifique o tempo verbal: "Eles viajaram para o Rio."',sub:'',a:'Pretérito perfeito',ex:'Ação concluída no passado = <strong>pretérito perfeito</strong>. Terminação -aram.'},

  // ACENTUAÇÃO (8)
  {cat:'acentuacao',label:'Acentuação',q:'O que é uma palavra proparoxítona?',sub:'',a:'A palavra cuja sílaba tônica está na antepenúltima sílaba (3ª contando do fim)',ex:'mé-di-co → a sílaba <strong>MÉ</strong> é a 3ª do fim. Proparoxítona!'},
  {cat:'acentuacao',label:'Acentuação',q:'As proparoxítonas são sempre acentuadas?',sub:'',a:'Sim! Todas as proparoxítonas têm acento obrigatório',ex:'<strong>médico, lâmpada, pálido, ótimo</strong> — todas têm acento.'},
  {cat:'acentuacao',label:'Acentuacao',q:'"médico" é proparoxítona?',sub:'Divida em sílabas e verifique',a:'Sim! mé-di-co → MÉ é a 3ª sílaba do fim',ex:'mé | di | co → acento na <strong>1ª sílaba</strong>, que é a 3ª contando do fim.'},
  {cat:'acentuacao',label:'Acentuação',q:'"matemática" é proparoxítona?',sub:'ma-te-má-ti-ca',a:'Sim! ma-te-MÁ-ti-ca → MÁ é a 3ª do fim',ex:'ma | te | <strong>má</strong> | ti | ca → acento na sílaba MÁ, 3ª do fim.'},
  {cat:'acentuacao',label:'Acentuação',q:'"lâmpada" é proparoxítona?',sub:'Divida: lâm-pa-da',a:'Sim! LÂM-pa-da → LÂM é a 3ª do fim',ex:'<strong>lâm</strong> | pa | da → acento na sílaba LÂM.'},
  {cat:'acentuacao',label:'Acentuação',q:'"histórico" é proparoxítona?',sub:'Divida: his-tó-ri-co',a:'Sim! his-TÓ-ri-co → TÓ é a 3ª do fim',ex:'his | <strong>tó</strong> | ri | co → acento na sílaba TÓ, 3ª do fim.'},
  {cat:'acentuacao',label:'Acentuação',q:'Qual é o macete para identificar proparoxítonas?',sub:'',a:'Conta 3 sílabas do final. Se o acento está na 3ª, é proparoxítona.',ex:'pá-ro-co: co(1) ro(2) pá(3) → acento na 3ª = <strong>proparoxítona</strong>.'},
  {cat:'acentuacao',label:'Acentuação',q:'"ótimo" é proparoxítona?',sub:'Divida: ó-ti-mo',a:'Sim! Ó-ti-mo → Ó é a 3ª do fim',ex:'<strong>ó</strong> | ti | mo → acento na sílaba Ó, 3ª do fim.'},

  // LEITURA (4)
  {cat:'leitura',label:'Leitura',q:'O que é uma informação explícita?',sub:'',a:'Está escrita diretamente no texto — é só ler',ex:'Texto: "Ana tem 10 anos." → A idade de Ana é <strong>explícita</strong>.'},
  {cat:'leitura',label:'Leitura',q:'O que é uma informação implícita?',sub:'',a:'Não está escrita, mas pode ser entendida pelas pistas do texto',ex:'"Ana pegou o guarda-chuva." → <strong>Implícito:</strong> ia chover.'},
  {cat:'leitura',label:'Leitura',q:'Quando a pergunta diz "de acordo com o texto", a resposta é explícita ou implícita?',sub:'',a:'Explícita — a resposta está escrita no texto',ex:'Se pede "de acordo com o texto", você só precisa encontrar a informação escrita.'},
  {cat:'leitura',label:'Leitura',q:'Quando a pergunta diz "podemos concluir que", a resposta é explícita ou implícita?',sub:'',a:'Implícita — você precisa interpretar as pistas',ex:'"Podemos concluir que..." = você precisa <strong>interpretar</strong>, não só copiar.'},
];

var cards=allCards.slice(),currentIndex=0,showingAnswer=false,currentFilter='all';
var knownSet=new Set(),reviewSet=new Set();
var flashcard=document.getElementById('flashcard'),cardLabel=document.getElementById('cardLabel'),cardCounter=document.getElementById('cardCounter'),cardContent=document.getElementById('cardContent'),cardHint=document.getElementById('cardHint'),catBadge=document.getElementById('catBadge'),progressText=document.getElementById('progressText'),progressFill=document.getElementById('progressFill'),statGood=document.getElementById('statGood'),statReview=document.getElementById('statReview'),statLeft=document.getElementById('statLeft'),finishedScreen=document.getElementById('finishedScreen'),finishedStats=document.getElementById('finishedStats');
function getId(c){return c.cat+'::'+c.q;}
function renderFront(c){cardContent.innerHTML='<div class="card-prompt">'+c.q+'</div>'+(c.sub?'<div class="card-sub">'+c.sub+'</div>':'');cardHint.textContent='👆 toque para ver a resposta';flashcard.classList.remove('is-back');}
function renderBack(c){cardContent.innerHTML='<div class="card-answer">'+c.a+'</div>'+(c.ex?'<div class="card-example">'+c.ex+'</div>':'');cardHint.textContent='👆 toque para ver a pergunta';flashcard.classList.add('is-back');}
function renderCard(){if(!cards.length){cardContent.innerHTML='<div class="card-prompt">🎉</div><div class="card-sub">Nenhum card nesse filtro!</div>';cardLabel.textContent='';cardCounter.textContent='';cardHint.textContent='';return;}var c=cards[currentIndex];showingAnswer=false;cardLabel.textContent=c.label;cardCounter.textContent=(currentIndex+1)+'/'+cards.length;renderFront(c);var cats={substantivos:'Substantivos',verbos:'Verbos',acentuacao:'Acentuação',leitura:'Leitura'};catBadge.textContent=cats[c.cat]||c.cat;progressText.textContent=(currentIndex+1)+' / '+cards.length;progressFill.style.width=((currentIndex+1)/cards.length*100)+'%';updateStats();}
function toggleAnswer(){if(!cards.length)return;var c=cards[currentIndex];if(!c||c.cat==='info')return;flashcard.classList.add('fading');setTimeout(function(){showingAnswer=!showingAnswer;if(showingAnswer)renderBack(c);else renderFront(c);flashcard.classList.remove('fading');},120);}
function updateStats(){statGood.textContent=knownSet.size;statReview.textContent=reviewSet.size;statLeft.textContent=Math.max(0,allCards.length-knownSet.size);}
function nextCard(){if(currentIndex<cards.length-1){currentIndex++;renderCard();}else showFinished();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
function showFinished(){flashcard.style.display='none';document.querySelector('.controls').style.display='none';finishedScreen.classList.add('show');finishedStats.innerHTML='✅ <strong>'+knownSet.size+'</strong> acertados<br>🔁 <strong>'+reviewSet.size+'</strong> para revisar';}
function restart(){currentIndex=0;flashcard.style.display='';document.querySelector('.controls').style.display='';finishedScreen.classList.remove('show');applyFilter(currentFilter);}
function shuffle(){for(var i=cards.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cards[i];cards[i]=cards[j];cards[j]=t;}currentIndex=0;renderCard();}
function applyFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter===f);});if(f==='all')cards=allCards.slice();else if(f==='review'){cards=allCards.filter(function(c){return reviewSet.has(getId(c));});if(!cards.length)cards=[{cat:'info',label:'',q:'😊',sub:'Nenhum card marcado para revisar!',a:'',ex:''}];}else cards=allCards.filter(function(c){return c.cat===f;});currentIndex=0;renderCard();}
flashcard.addEventListener('click',toggleAnswer);
flashcard.addEventListener('keydown',function(e){if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleAnswer();}});
document.getElementById('nextBtn').addEventListener('click',function(e){e.stopPropagation();nextCard();});
document.getElementById('prevBtn').addEventListener('click',function(e){e.stopPropagation();prevCard();});
document.getElementById('gotItBtn').addEventListener('click',function(e){e.stopPropagation();if(!cards.length||cards[currentIndex].cat==='info')return;var id=getId(cards[currentIndex]);knownSet.add(id);reviewSet.delete(id);nextCard();});
document.getElementById('reviewBtn').addEventListener('click',function(e){e.stopPropagation();if(!cards.length||cards[currentIndex].cat==='info')return;var id=getId(cards[currentIndex]);reviewSet.add(id);knownSet.delete(id);nextCard();});
document.getElementById('shuffleBtn').addEventListener('click',shuffle);
document.getElementById('resetBtn').addEventListener('click',function(){if(confirm('Resetar todo o progresso?')){knownSet.clear();reviewSet.clear();applyFilter('all');}});
document.getElementById('restartBtn').addEventListener('click',restart);
document.querySelectorAll('.filter-btn').forEach(function(btn){btn.addEventListener('click',function(){applyFilter(btn.dataset.filter);});});
document.addEventListener('keydown',function(e){if(e.target===flashcard)return;if(e.key==='ArrowRight')nextCard();else if(e.key==='ArrowLeft')prevCard();else if(e.key===' '){e.preventDefault();toggleAnswer();}});
document.querySelector('[data-filter="all"]').textContent='Todos ('+allCards.length+')';
renderCard();
</script>
</body>
</html>
