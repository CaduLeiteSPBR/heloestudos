<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math — Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
:root{--paper:#fef9ec;--ink:#1a1a2e;--red:#e63946;--yellow:#ffbe0b;--blue:#3a86ff;--green:#06a77d;--teal:#0096a0;--purple:#7209b7;--shadow:5px 5px 0 var(--ink)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding:20px 16px 48px;background-image:radial-gradient(circle at 15% 10%,rgba(0,150,160,.15) 0%,transparent 40%),radial-gradient(circle at 85% 85%,rgba(114,9,183,.12) 0%,transparent 40%)}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:24px;padding:20px 20px 16px;background:#fff;border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);position:relative}
header::before{content:'📐';position:absolute;top:-16px;left:20px;font-size:34px;transform:rotate(-10deg)}
header::after{content:'⭐';position:absolute;top:-16px;right:20px;font-size:34px;transform:rotate(10deg)}
h1{font-family:'Fraunces',serif;font-size:clamp(1.5rem,5vw,2.1rem);font-weight:900;line-height:1}
h1 .accent{color:var(--teal);font-style:italic}
.subtitle{font-family:'Caveat',cursive;font-size:1.2rem;color:var(--blue);margin-top:4px}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-weight:700;font-size:.9rem}
.progress-bar{flex:1;height:12px;background:#e8e8e8;border:2px solid var(--ink);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);width:0%;transition:width .4s}
.question-card{background:#fff;border:3px solid var(--ink);border-radius:18px;padding:22px 18px 18px;box-shadow:var(--shadow);margin-bottom:14px}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.q-number{font-family:'Fraunces',serif;font-size:1rem;font-weight:900;background:var(--ink);color:var(--paper);padding:2px 10px;border-radius:20px}
.q-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border:2px solid var(--ink);border-radius:20px;background:var(--yellow);text-transform:uppercase;letter-spacing:.4px}
.q-passage{background:#f0fffe;border-left:4px solid var(--teal);padding:10px 13px;border-radius:6px;font-size:.91rem;line-height:1.6;margin-bottom:14px;font-style:italic}
.q-text{font-size:1.03rem;font-weight:700;line-height:1.4;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:9px}
.option{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border:2px solid #ccc;border-radius:12px;cursor:pointer;background:#fafafa;transition:all .15s;font-size:.95rem;font-weight:500;text-align:left;width:100%;font-family:'DM Sans',sans-serif;line-height:1.4}
.option:hover:not(.locked){border-color:var(--teal);background:#f0fffe;transform:translateX(3px)}
.option .letter{font-family:'Fraunces',serif;font-weight:900;font-size:.95rem;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:2px solid var(--ink);border-radius:50%;background:#fff;flex-shrink:0;margin-top:1px}
.option.locked{cursor:default}
.option.correct{border-color:var(--green);background:#e6fff6}
.option.correct .letter{background:var(--green);color:#fff;border-color:var(--green)}
.option.wrong{border-color:var(--red);background:#fff0f0}
.option.wrong .letter{background:var(--red);color:#fff;border-color:var(--red)}
.option.show-ok{border-color:var(--green);background:#e6fff6;opacity:.55}
.feedback{display:none;margin-top:12px;padding:11px 13px;border-radius:10px;font-size:.91rem;line-height:1.5;border:2px solid}
.feedback.show{display:block}
.feedback.correct{background:#e6fff6;border-color:var(--green);color:#054f35}
.feedback.wrong{background:#fff0f0;border-color:var(--red);color:#7a1010}
.btn-next{display:none;margin-top:12px;width:100%;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:13px;border:3px solid var(--ink);border-radius:12px;background:var(--teal);color:#fff;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:all .1s}
.btn-next:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.btn-next.show{display:block}
.results{display:none;text-align:center;background:#fff;border:3px solid var(--ink);border-radius:20px;padding:32px 22px;box-shadow:var(--shadow)}
.results.show{display:block}
.results .big-emoji{font-size:3.8rem;display:block;margin-bottom:8px}
.results h2{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:900;margin-bottom:8px}
.score-display{font-family:'Fraunces',serif;font-size:3.2rem;font-weight:900;color:var(--teal);margin:10px 0}
.score-label{font-family:'Caveat',cursive;font-size:1.2rem;color:#666;margin-bottom:18px}
.result-breakdown{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.result-item{text-align:center;padding:9px 16px;border:2px solid var(--ink);border-radius:12px;background:var(--paper)}
.r-val{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;display:block}
.r-val.green{color:var(--green)}.r-val.red{color:var(--red)}
.r-label{font-size:.78rem;font-weight:700}
.wrong-list{text-align:left;background:#fff8f8;border:2px solid var(--red);border-radius:12px;padding:13px 15px;margin-bottom:18px;font-size:.88rem;line-height:1.7}
.wrong-list h3{font-family:'Fraunces',serif;font-size:.95rem;color:var(--red);margin-bottom:7px}
.btn-restart{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;padding:12px 26px;border:3px solid var(--ink);border-radius:12px;background:var(--green);color:#fff;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
.btn-restart:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
</style>
</head>
<body>
<div class="container">
<header>
  <h1><span class="accent">Math</span> Quiz</h1>
  <p class="subtitle">15 questions — go for it, Helô! 💪</p>
</header>
<div class="progress-wrap">
  <span id="progressLabel">Question 1 of 15</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div id="quizArea"></div>
<div class="results" id="resultsScreen"></div>
</div>
<script>
var questions=[
  // SYMMETRY (3)
  {tag:'Symmetry',q:'A shape is flipped over a line to create a mirror image. Which transformation is this?',opts:['Translation','Rotation','Reflection','Dilation'],c:2,why:'Flipping over a line = reflection (mirror image). The shape stays the same size.'},
  {tag:'Symmetry',q:'A triangle is turned 90° clockwise around a point. Which transformation is this?',opts:['Reflection','Translation','Symmetry','Rotation'],c:3,why:'Turning around a point = rotation. 90° = a quarter turn.'},
  {tag:'Symmetry',q:'Which statement is TRUE about all three transformations (reflection, rotation, translation)?',opts:['They change the size of the shape.','They change the color of the shape.','They keep the shape and size the same.','They always move the shape to the right.'],c:2,why:'All three transformations preserve size and shape. Only position or orientation changes.'},
  // TRIANGLES (4)
  {tag:'Triangles',q:'What type of triangle has 3 equal sides and 3 angles of 60°?',opts:['Scalene','Right','Isosceles','Equilateral'],c:3,why:'Equilateral = all 3 sides equal, all 3 angles equal (60° each).'},
  {tag:'Triangles',q:'A triangle has angles of 40° and 70°. What is the measure of the third angle?',opts:['60°','70°','80°','90°'],c:1,why:'All angles add to 180°. 180 − 40 − 70 = 70°.'},
  {tag:'Triangles',passage:'Triangle ABC has angles: A = 35°, B = 90°, C = 55°.',q:'What type of triangle is this?',opts:['Equilateral','Scalene','Right triangle','Isosceles'],c:2,why:'It has one 90° angle (angle B) → right triangle.'},
  {tag:'Triangles',q:'An angle of 130° is classified as:',opts:['Acute','Right','Straight','Obtuse'],c:3,why:'Obtuse = more than 90° but less than 180°. 130° > 90° → obtuse.'},
  // FRACTIONS (3)
  {tag:'Fractions',q:'5/12 + 4/12 = ?',opts:['9/24','1/12','9/12','10/12'],c:2,why:'Same denominator: add numerators only. 5+4=9. Denominator stays 12 → 9/12.'},
  {tag:'Fractions',passage:'Maria ran 7/10 km in the morning and 2/10 km in the afternoon.',q:'How many km did Maria run in total?',opts:['5/10 km','9/20 km','9/10 km','14/10 km'],c:2,why:'7/10 + 2/10 = 9/10. Same denominator → add numerators: 7+2=9.'},
  {tag:'Fractions',q:'Solve: (4 + 6) × 3',opts:['22','30','34','18'],c:1,why:'Parentheses first: (4+6)=10. Then: 10×3=30.'},
  // MEASUREMENT (3)
  {tag:'Measurement',q:'How many seconds are in 2 minutes?',opts:['100','60','200','120'],c:3,why:'1 minute = 60 seconds. 2 minutes = 2 × 60 = 120 seconds.'},
  {tag:'Measurement',q:'Which unit is best for measuring the distance between two cities?',opts:['Millimeters','Centimeters','Kilometers','Meters'],c:2,why:'Kilometers (km) are used for long distances like city-to-city. 1 km = 1,000 m.'},
  {tag:'Measurement',passage:'A rope is 3 meters long.',q:'How long is the rope in centimeters?',opts:['30 cm','300 cm','3,000 cm','0.3 cm'],c:1,why:'1 m = 100 cm. 3 m × 100 = 300 cm.'},
  // DATA (2)
  {tag:'Data',q:'Which type of graph is BEST for showing how a plant\'s height changed over 6 months?',opts:['Bar graph','Pie chart','Line graph','Tally chart'],c:2,why:'Line graphs show change over time. Perfect for tracking growth month by month.'},
  {tag:'Data',passage:'A bar graph shows: Monday = 20 books, Tuesday = 35 books, Wednesday = 15 books.',q:'How many MORE books were read on Tuesday than on Wednesday?',opts:['15 books','20 books','50 books','55 books'],c:1,why:'35 − 15 = 20 books more on Tuesday than Wednesday.'},
];

var currentQ=0,score=0,wrongQuestions=[],answered=false;

function renderQuestion(){
  var q=questions[currentQ];answered=false;
  document.getElementById('progressFill').style.width=(currentQ/questions.length*100)+'%';
  document.getElementById('progressLabel').textContent='Question '+(currentQ+1)+' of '+questions.length;
  var letters=['A','B','C','D'];
  var passHTML=q.passage?'<div class="q-passage">'+q.passage+'</div>':'';
  var optsHTML=q.opts.map(function(o,i){return '<button class="option" data-index="'+i+'"><span class="letter">'+letters[i]+'</span><span>'+o+'</span></button>';}).join('');
  document.getElementById('quizArea').innerHTML='<div class="question-card"><div class="q-meta"><span class="q-number">Q'+(currentQ+1)+'</span><span class="q-tag">'+q.tag+'</span></div>'+passHTML+'<div class="q-text">'+q.q+'</div><div class="options">'+optsHTML+'</div><div class="feedback" id="feedback"></div><button class="btn-next" id="btnNext">'+(currentQ<questions.length-1?'Next question →':'See results 🎉')+'</button></div>';
  document.querySelectorAll('.option').forEach(function(btn){btn.addEventListener('click',function(){if(answered)return;selectAnswer(parseInt(btn.dataset.index));});});
  document.getElementById('btnNext').addEventListener('click',function(){currentQ++;if(currentQ<questions.length)renderQuestion();else showResults();});
}

function selectAnswer(chosen){
  answered=true;var q=questions[currentQ];var isCorrect=chosen===q.c;var letters=['A','B','C','D'];
  if(isCorrect)score++;else wrongQuestions.push({n:currentQ+1,text:q.q,correct:letters[q.c]+') '+q.opts[q.c]});
  document.querySelectorAll('.option').forEach(function(btn,i){btn.classList.add('locked');if(i===q.c&&i===chosen)btn.classList.add('correct');else if(i===chosen)btn.classList.add('wrong');else if(i===q.c)btn.classList.add('show-ok');});
  var fb=document.getElementById('feedback');fb.classList.add('show');fb.classList.add(isCorrect?'correct':'wrong');
  fb.innerHTML='<strong>'+(isCorrect?'✅ Correct!':'❌ Not quite.')+'</strong> '+q.why;
  document.getElementById('btnNext').classList.add('show');
}

function showResults(){
  document.getElementById('quizArea').style.display='none';document.getElementById('progressLabel').parentElement.style.display='none';
  var pct=Math.round(score/questions.length*100);var emoji,msg;
  if(pct>=90){emoji='🏆';msg='Outstanding! You\'re ready for the test!';}
  else if(pct>=70){emoji='🌟';msg='Great job! Review the topics below and you\'ll ace it!';}
  else if(pct>=50){emoji='💪';msg='Good effort! Study the topics below and try again.';}
  else{emoji='📚';msg='Keep studying! Review the sheet and flashcards, then try again.';}
  var wrongHTML='';
  if(wrongQuestions.length){wrongHTML='<div class="wrong-list"><h3>⚠️ Review these topics:</h3>';wrongQuestions.forEach(function(w){wrongHTML+='<div>Q'+w.n+': '+w.text+'<br><strong>✓ '+w.correct+'</strong></div><br>';});wrongHTML+='</div>';}
  var rs=document.getElementById('resultsScreen');
  rs.innerHTML='<span class="big-emoji">'+emoji+'</span><h2>'+msg+'</h2><div class="score-display">'+score+' / '+questions.length+'</div><div class="score-label">'+pct+'% correct</div><div class="result-breakdown"><div class="result-item"><span class="r-val green">'+score+'</span><span class="r-label">Correct</span></div><div class="result-item"><span class="r-val red">'+wrongQuestions.length+'</span><span class="r-label">Wrong</span></div><div class="result-item"><span class="r-val" style="color:var(--teal)">'+pct+'%</span><span class="r-label">Score</span></div></div>'+wrongHTML+'<button class="btn-restart" id="btnRestart">Try again 🔁</button>';
  rs.classList.add('show');
  document.getElementById('btnRestart').addEventListener('click',function(){currentQ=0;score=0;wrongQuestions=[];answered=false;document.getElementById('quizArea').style.display='';document.getElementById('progressLabel').parentElement.style.display='';rs.classList.remove('show');renderQuestion();});
}
renderQuestion();
</script>
</body>
</html>
